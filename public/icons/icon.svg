<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect x="0" y="0" width="120" height="120" rx="12" fill="url(#brand-gradient)" />

  <!-- "Px" text -->
  <text x="60" y="75" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="48" fill="white" text-anchor="middle" dominant-baseline="central">
    <tspan font-size="52" font-weight="900">P</tspan><tspan font-size="42" font-weight="700">x</tspan>
  </text>
</svg>
