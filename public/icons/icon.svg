<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5" />
      <stop offset="100%" style="stop-color:#3b38f7" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="100%" style="stop-color:#4f46e5" />
    </linearGradient>
  </defs>

  <!-- Main P shape with modern geometric styling -->
  <path d="M20 15 L20 85 L32 85 L32 55 L60 55 C74 55 82 47 82 35 C82 23 74 15 60 15 L20 15 Z" fill="url(#brand-gradient)" />
  <path d="M32 25 L58 25 C68 25 72 29 72 35 C72 41 68 45 58 45 L32 45 Z" fill="white" />

  <!-- Abstract progress/movement elements -->
  <circle cx="15" cy="75" r="3" fill="url(#accent-gradient)" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="35" cy="68" r="2" fill="url(#accent-gradient)" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" begin="0.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="55" cy="75" r="2.5" fill="url(#accent-gradient)" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="75" cy="68" r="2" fill="url(#accent-gradient)" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" begin="1.5s" repeatCount="indefinite" />
  </circle>

  <!-- Subtle connecting path -->
  <path d="M15 75 Q35 65 55 75 Q75 65 85 68" stroke="url(#accent-gradient)" stroke-width="1.5" fill="none" opacity="0.3" />
</svg>
